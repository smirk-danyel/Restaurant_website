<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karibu Restaurant Menu</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: bisque;
        margin: 0;
        padding: 0;
        text-align: center;
      }
      header {
        background-color: black;
        padding: 30px 0;
        color: aliceblue;
        font-size: 36px;
        font-weight: bold;
      }
      h2 {
        margin-top: 40px;
        color: black;
        color: black;
        table {
          width: 80%;
          margin: 20px auto;
          border-collapse: collapse;
        }

        table,
        th,
        td {
          border: 1px solid;
        }

        th,
        td {
          padding: 12px;
          text-align: left;
        }

        th {
          background-color: bisque;
        }

        img.menu-image {
          width: 100%;
          max-width: 600px;
          display: block;
          margin: 20px auto;
          border-radius: 10px;
        }
      }
    </style>
  </head>
  <body>
    <header>Karibu Restaurant Menu</header>

    <h2>Starters</h2>
    <table>
      <tr>
        <th>Dish</th>
        <th>Price</th>
      </tr>
      <tr>
        <td>Spring Rolls</td>
        <td>Ksh 300</td>
      </tr>
      <tr>
        <td>Chicken Wings</td>
        <td>Ksh 400</td>
      </tr>
    </table>
    <img src="image/starters.jpg" alt="Starters Dish" class="menu-image" />

    <h2>Breakfast</h2>
    <table>
      <tr>
        <th>Dish</th>
        <th>Price</th>
      </tr>
      <tr>
        <td>Pancakes</td>
        <td>Ksh 200</td>
      </tr>
      <tr>
        <td>Omelette</td>
        <td>Ksh 250</td>
      </tr>
      <tr>
        <td>Tea or Coffee</td>
        <td>Ksh 100</td>
      </tr>
    </table>
    <img src="image/Breakfast.jpg" alt="Breakfast Dish" class="menu-image" />

    <h2>Main Dishes</h2>
    <table>
      <tr>
        <th>Dish</th>
        <th>Price</th>
      </tr>
      <tr>
        <td>Grilled Chicken</td>
        <td>Ksh 850</td>
      </tr>
      <tr>
        <td>Beef Steak</td>
        <td>Ksh 1200</td>
      </tr>
      <tr>
        <td>Beef Pilau</td>
        <td>Ksh 500</td>
      </tr>
    </table>
    <img src="image/Maindish.jpg" alt="Main Dish" class="menu-image" />

    <div style="text-align: center; margin: 30px 0">
      <button
        style="
          padding: 10px 20px;
          background-color: black;
          color: antiquewhite;
          border: none;
          border-radius: 5px;
          cursor: pointer;
        "
      >
        Order Now
      </button>
    </div>
  </body>
</html>
