<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Karibu Restaurant Menu</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
        text-align: center;
      }

      h1 {
        background-color: #333;
        color: white;
        padding: 20px;
        margin: 0;
      }

      .header-img {
        width: 100%;
        height: 300px;
        object-fit: cover;
      }

      h2 {
        margin-top: 40px;
        color: #333;
      }

      table {
        margin: 20px auto;
        border-collapse: collapse;
        width: 80%;
        background-color: white;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 12px;
      }

      th {
        background-color: #555;
        color: white;
      }

      img.food-img {
        width: 250px;
        height: 150px;
        object-fit: cover;
        margin: 10px 0;
        border-radius: 10px;
      }

      .order-btn {
        display: inline-block;
        margin: 40px;
        padding: 15px 30px;
        background-color: #ff6600;
        color: white;
        text-decoration: none;
        font-size: 18px;
        border-radius: 8px;
      }

      .order-btn:hover {
        background-color: #e65c00;
      }
    </style>
  </head>

  <body>
    <h1>Karibu Restaurant Menu</h1>

    <!-- Header Image -->
    <img src="image/Karibu Restaurant.jpg" class="header-img" />

    <!-- Starters -->
    <h2>Starters</h2>
    <img src="image/starters.jpg" class="food-img" />

    <table>
      <tr>
        <th>Food</th>
        <th>Price</th>
      </tr>
      <tr>
        <td>Soup</td>
        <td>Ksh 200</td>
      </tr>
      <tr>
        <td>Salad</td>
        <td>Ksh 250</td>
      </tr>
    </table>

    <!-- Breakfast -->
    <h2>Breakfast</h2>
    <img src="image/Breakfast.jpg" class="food-img" />

    <table>
      <tr>
        <th>Food</th>
        <th>Price</th>
      </tr>
      <tr>
        <td>Pancakes</td>
        <td>Ksh 300</td>
      </tr>
      <tr>
        <td>Omelette</td>
        <td>Ksh 250</td>
      </tr>
    </table>

    <!-- Main Dishes -->
    <h2>Main Dishes</h2>
    <img src="image/Maindish.jpg" class="food-img" />

    <table>
      <tr>
        <th>Food</th>
        <th>Price</th>
      </tr>
      <tr>
        <td>Grilled Chicken</td>
        <td>Ksh 600</td>
      </tr>
      <tr>
        <td>Beef Stew</td>
        <td>Ksh 550</td>
      </tr>
    </table>

    <!-- Order Button -->
    <a href="#" class="order-btn">Order Now</a>
  </body>
</html>
